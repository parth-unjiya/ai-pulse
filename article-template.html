<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{EXCERPT}}">

  <title>{{TITLE}} — AI Pulse</title>

  <!-- Open Graph -->
  <meta property="og:title" content="{{TITLE}} — AI Pulse">
  <meta property="og:description" content="{{EXCERPT}}">
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{DATE}}">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%234f46e5'/><stop offset='100%' stop-color='%237c3aed'/></linearGradient></defs><path d='M18 2L6 18h8l-2 12 12-16h-8z' fill='url(%23g)'/></svg>" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Reading Progress Bar -->
  <div class="reading-progress-bar" id="reading-progress" role="progressbar" aria-label="Reading progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

  <!-- Navigation -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-inner container">
      <a href="../" class="nav-logo" aria-label="AI Pulse home">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 32 32" aria-hidden="true">
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#4f46e5"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <path d="M18 2L6 18h8l-2 12 12-16h-8z" fill="url(#logo-grad)"/>
        </svg>
        <span>AI Pulse</span>
      </a>

      <button
        class="theme-toggle"
        id="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        title="Toggle dark mode"
      >
        <!-- Sun icon (shown in dark mode) -->
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Article -->
  <article class="article-page">
    <header class="article-header">
      <div class="container">
        <span class="category-tag">{{CATEGORY_TAG}}</span>
        <h1 class="article-title">{{TITLE}}</h1>
        <div class="article-meta">
          <time datetime="{{DATE}}">{{DATE_FORMATTED}}</time>
          <span class="meta-separator" aria-hidden="true">&middot;</span>
          <span>{{READING_TIME}} min read</span>
          <span class="meta-separator" aria-hidden="true">&middot;</span>
          <span>{{ARTICLE_COUNT}} articles from {{SOURCE_COUNT}} sources</span>
        </div>
      </div>
    </header>

    <div class="article-content">
      <div class="container-narrow">
        {{CONTENT}}
      </div>
    </div>
  </article>

  <!-- Article Footer -->
  <div class="article-footer">
    <div class="container-narrow">
      <a href="../" class="back-link" aria-label="Back to all digests">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to all digests
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <p class="footer-copy">&copy; 2026 AI Pulse. All rights reserved.</p>
      <p class="footer-powered">
        Powered by <strong>AI Pulse</strong> &middot;
        <a href="https://t.me/cyberrr_knighttt_bot" target="_blank" rel="noopener noreferrer" aria-label="Follow AI Pulse on Telegram">
          Telegram
          <svg class="external-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
